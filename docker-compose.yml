version: '3'

services:
  goravel:
    build:
      context: .
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goravel-cloud-computing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: endank122
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
